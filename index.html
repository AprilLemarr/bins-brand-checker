<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bins Brand Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            line-height: 1.4;
            padding: 12px;
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 12px;
            color: #666;
        }

        .upload-section {
            margin-bottom: 20px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        #photoInput {
            display: none;
        }

        .upload-btn {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .upload-btn:hover {
            background: #333;
        }

        .upload-btn:active {
            transform: scale(0.98);
        }

        .photo-preview {
            margin-top: 12px;
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            background: #f5f5f5;
        }

        .photo-preview img {
            width: 100%;
            display: block;
            max-height: 400px;
            object-fit: cover;
        }

        .clear-photo-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .clear-photo-btn:hover {
            background: rgba(0, 0, 0, 0.9);
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 13px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e0e0e0;
            border-top: 2px solid #1a1a1a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .verdict-box {
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 12px;
            font-size: 13px;
            line-height: 1.5;
        }

        .verdict-box.grab-it {
            background: #d4edda;
            border-left: 4px solid #28a745;
            color: #155724;
        }

        .verdict-box.check-comps {
            background: #cfe2ff;
            border-left: 4px solid #0d6efd;
            color: #084298;
        }

        .verdict-box.maybe {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            color: #664d03;
        }

        .verdict-box.skip-it {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            color: #721c24;
        }

        .verdict-label {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .verdict-label span {
            font-size: 16px;
        }

        .verdict-reason {
            margin: 6px 0;
            font-size: 12px;
        }

        .price-range {
            background: rgba(255, 255, 255, 0.5);
            padding: 8px;
            border-radius: 4px;
            margin: 6px 0;
            font-weight: 600;
            font-size: 13px;
        }

        .ebay-link {
            display: inline-block;
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 4px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            word-break: break-all;
            transition: background 0.2s;
        }

        .ebay-link:hover {
            background: rgba(255, 255, 255, 1);
        }

        .clarification-section {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            margin-top: 12px;
        }

        .clarification-section p {
            font-size: 12px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .clarification-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .button-group button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-clarification {
            background: #0d6efd;
            color: white;
        }

        .submit-clarification:hover {
            background: #0b5ed7;
        }

        .cancel-clarification {
            background: #e9ecef;
            color: #1a1a1a;
        }

        .cancel-clarification:hover {
            background: #dee2e6;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .buy-btn {
            background: #28a745;
            color: white;
        }

        .buy-btn:hover {
            background: #218838;
        }

        .buy-btn:active {
            transform: scale(0.98);
        }

        .maybe-btn {
            background: #ffc107;
            color: #000;
        }

        .maybe-btn:hover {
            background: #e0a800;
        }

        .maybe-btn:active {
            transform: scale(0.98);
        }

        .history-section {
            margin-top: 20px;
            padding-top: 12px;
            border-top: 2px solid #f0f0f0;
        }

        .history-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-history-btn {
            background: #e9ecef;
            color: #1a1a1a;
            border: none;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
        }

        .clear-history-btn:hover {
            background: #dee2e6;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 4px;
            font-size: 11px;
            border-left: 3px solid #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item.grab {
            border-left-color: #28a745;
        }

        .history-item.check {
            border-left-color: #0d6efd;
        }

        .history-item.maybe {
            border-left-color: #ffc107;
        }

        .history-item.skip {
            border-left-color: #dc3545;
        }

        .history-verdict {
            font-weight: 600;
            margin-bottom: 2px;
        }

        .history-details {
            color: #666;
            font-size: 10px;
        }

        .history-remove {
            background: #dc3545;
            color: white;
            border: none;
            padding: 2px 6px;
            border-radius: 2px;
            font-size: 10px;
            cursor: pointer;
        }

        .history-remove:hover {
            background: #c82333;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 90%;
            text-align: center;
        }

        .modal-content h2 {
            margin-bottom: 10px;
            font-size: 16px;
        }

        .modal-content p {
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-btn-yes {
            background: #dc3545;
            color: white;
        }

        .modal-btn-no {
            background: #e9ecef;
            color: #1a1a1a;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 12px;
            border-left: 4px solid #dc3545;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛍️ Bins Checker</h1>
        <p>Instant brand verdicts at the bins</p>
    </div>

    <div class="upload-section">
        <div class="file-input-wrapper">
            <button class="upload-btn" onclick="document.getElementById('photoInput').click()">
                📸 Take or Upload Photo
            </button>
            <input type="file" id="photoInput" accept="image/*" onchange="handlePhotoUpload(event)">
        </div>

        <div id="photoPreview" class="photo-preview" style="display: none;">
            <img id="previewImg" src="" alt="preview">
            <button class="clear-photo-btn" onclick="clearPhoto()">Clear</button>
        </div>
    </div>

    <div id="errorContainer"></div>

    <div id="loadingContainer" style="display: none;">
        <div class="loading">
            <div class="spinner"></div>
            Analyzing...
        </div>
    </div>

    <div id="verdictContainer"></div>

    <div id="clarificationContainer"></div>

    <div id="historyContainer" class="history-section" style="display: none;">
        <div class="history-title">
            Session History
            <button class="clear-history-btn" onclick="confirmClearHistory()">Clear All</button>
        </div>
        <div id="historyList" class="history-list"></div>
    </div>

    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h2>Clear History?</h2>
            <p>This will delete all verdicts from this session. You can't undo this.</p>
            <div class="modal-buttons">
                <button class="modal-btn-yes" onclick="clearHistory()">Yes, Clear</button>
                <button class="modal-btn-no" onclick="closeModal()">No, Keep It</button>
            </div>
        </div>
    </div>

    <script>
        let currentImageBase64 = null;
        let analysisHistory = [];
        let currentAnalysis = null;
        let currentClarificationCallback = null;

        async function handlePhotoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                currentImageBase64 = e.target.result;
                const preview = document.getElementById('photoPreview');
                document.getElementById('previewImg').src = currentImageBase64;
                preview.style.display = 'block';
                
                setTimeout(() => analyzeImage(), 300);
            };
            reader.readAsDataURL(file);
        }

        function clearPhoto() {
            currentImageBase64 = null;
            document.getElementById('photoPreview').style.display = 'none';
            document.getElementById('photoInput').value = '';
            document.getElementById('verdictContainer').innerHTML = '';
            document.getElementById('clarificationContainer').innerHTML = '';
            document.getElementById('errorContainer').innerHTML = '';
        }

        async function analyzeImage() {
            if (!currentImageBase64) return;

            document.getElementById('loadingContainer').style.display = 'block';
            document.getElementById('verdictContainer').innerHTML = '';
            document.getElementById('clarificationContainer').innerHTML = '';
            document.getElementById('errorContainer').innerHTML = '';

            try {
                const response = await fetch('/.netlify/functions/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1000,
                        messages: [
                            {
                                role: 'user',
                                content: [
                                    {
                                        type: 'image',
                                        source: {
                                            type: 'base64',
                                            media_type: 'image/jpeg',
                                            data: currentImageBase64.split(',')[1]
                                        }
                                    },
                                    {
                                        type: 'text',
                                        text: getAnalysisPrompt()
                                    }
                                ]
                            }
                        ]
                    })
                });

                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error?.message || 'API error');
                }

                const analysisText = data.content[0].text;
                parseAndDisplayVerdict(analysisText);
            } catch (error) {
                document.getElementById('errorContainer').innerHTML = `
                    <div class="error-message">
                        Error: ${error.message}. Try again.
                    </div>
                `;
            } finally {
                document.getElementById('loadingContainer').style.display = 'none';
            }
        }

        function getAnalysisPrompt() {
            return `Analyze this clothing item from a thrift bin and provide a reselling verdict.

YOU ARE AN EXPERT THRIFT RESELLER ADVISOR. Analyze the clothing item and provide:

1. BRAND IDENTIFICATION
Look for logos, tags, stitching quality. If you can't clearly identify the brand, ask ONE clarifying question only.

2. TIER CLASSIFICATION
- TIER 1 (Always Grab): Patagonia, Arc'teryx, North Face, Columbia, Carhartt, Filson, Eddie Bauer, REI Co-op, Levi's, J.Crew, Lululemon, Athleta, Nike, Adidas, Coach, Kate Spade, Michael Kors, Torrid, Lane Bryant, Anthropologie, Free People, Madewell, Barbour, Canada Goose, Burberry, and similar high-demand brands
- TIER 2 (Selective): Alfani, Style & Co, Apt 9, LC Lauren Conrad, Target brands (Universal Thread, A New Day), Jessica Simpson, JLo, American Eagle, Ben Sherman, Buffalo David Bitton, Sanctuary, Vince Camuto, Max Studio, DKNY, Chico's, Banana Republic
- TIER 3 (Caution): Unknown or boutique brands, mall brands with low eBay demand
- ALWAYS SKIP: JCPenney brands (Karen Scott, Sag Harbor, Croft & Barrow), Walmart brands (AVIA, Danskin Now), Amazon generics (Yinoco, Dokotoo), fast fashion (Shein, Fashion Nova), no-name generics

3. CONDITION CHECK
- Visible stains, tears, holes, odor, major wear = lower value or skip
- Minor pilling, light wear, fading = acceptable
- Clean, well-maintained = premium pricing

4. PRICE TIER ASSESSMENT
- Items $45+ = GRAB IT (Green verdict)
- Items $25-45 = CHECK COMPS (Blue verdict - she decides)
- Items under $25 = Consider skipping unless exceptional
- Damaged beyond 60-second fix = SKIP IT

5. SEASONAL CONSIDERATIONS
- Halloween clothing: Aug 15-Oct 31 only
- Christmas/holiday: Oct 1-Dec 15 only
- Swimwear: Mar 1-Aug 31 only
- Heavy winter coats: Sep 1-Feb 28 only

6. STYLE/AESTHETIC BOOST
If this item has strong style keywords, mention them:
- Cottagecore, Fairycore (floral, crochet, lace, prairie)
- Grandmacore, Quiet Luxury (refined casual, soft knits)
- Cabincore, Gorpcore (flannel, fleece, Fair Isle, utility)
- Y2K (sequins, graphic tees, mini skirts, vintage logos)
- Boho (tie-dye, paisley, fringe, maxi)
- Basiccore (neutrals, minimal, quality fabrics)

7. PNW ADVANTAGE
If this is outdoor/rain gear, mention high demand in Pacific Northwest.

RESPONSE FORMAT:
Respond with ONLY a JSON object, no markdown, no explanation:
{
  "verdict": "GRAB_IT|CHECK_COMPS|SKIP_IT|MAYBE|SEASONAL",
  "reasoning": "one clear sentence why",
  "priceRange": "$X-$Y",
  "brand": "identified brand or null",
  "itemType": "shirt/jacket/pants/etc",
  "color": "color if visible",
  "condition": "excellent/good/fair/poor",
  "askClarification": null OR "What does the tag say?" / "Any visible damage?",
  "ebaySuggestion": "BRAND ITEM_TYPE" (e.g., "Patagonia fleece jacket"),
  "styleKeywords": ["keyword1", "keyword2"] or []
}

If uncertain and it might be worth researching: "MAYBE" verdict + NO clarification question. Save her time on dead-ends.`;
        }

        function parseAndDisplayVerdict(analysisText) {
            try {
                const analysis = JSON.parse(analysisText);
                currentAnalysis = analysis;

                if (analysis.askClarification) {
                    showClarificationQuestion(analysis);
                    return;
                }

                displayVerdict(analysis);
                addToHistory(analysis);
            } catch (error) {
                document.getElementById('errorContainer').innerHTML = `
                    <div class="error-message">
                        Parsing error. Please try again.
                    </div>
                `;
            }
        }

        function showClarificationQuestion(analysis) {
            const container = document.getElementById('clarificationContainer');
            container.innerHTML = `
                <div class="clarification-section">
                    <p>${analysis.askClarification}</p>
                    <input type="text" class="clarification-input" id="clarificationInput" placeholder="Answer briefly..." autofocus>
                    <div class="button-group">
                        <button class="submit-clarification" onclick="submitClarification()">Submit</button>
                        <button class="cancel-clarification" onclick="cancelClarification()">Skip</button>
                    </div>
                </div>
            `;

            document.getElementById('clarificationInput').focus();
        }

        function submitClarification() {
            const answer = document.getElementById('clarificationInput').value.trim();
            if (!answer) return;

            document.getElementById('clarificationContainer').innerHTML = '';
            document.getElementById('loadingContainer').style.display = 'block';

            // Re-analyze with clarification
            refineAnalysis(answer);
        }

        function cancelClarification() {
            // Use MAYBE verdict if user doesn't answer
            const analysis = {
                ...currentAnalysis,
                verdict: 'MAYBE',
                reasoning: 'Needs more research',
                askClarification: null
            };
            document.getElementById('clarificationContainer').innerHTML = '';
            displayVerdict(analysis);
            addToHistory(analysis);
        }

        async function refineAnalysis(clarification) {
            try {
                const response = await fetch('/.netlify/functions/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 500,
                        messages: [
                            {
                                role: 'user',
                                content: `Previous analysis: ${JSON.stringify(currentAnalysis)}
User answer: "${clarification}"

Based on this clarification, provide a FINAL verdict. Respond with ONLY JSON:
{
  "verdict": "GRAB_IT|CHECK_COMPS|SKIP_IT|MAYBE",
  "reasoning": "one sentence",
  "priceRange": "$X-$Y",
  "brand": "brand name",
  "itemType": "type",
  "color": "color",
  "condition": "condition",
  "ebaySuggestion": "BRAND ITEM_TYPE",
  "styleKeywords": []
}`
                            }
                        ]
                    })
                });

                const data = await response.json();
                const analysis = JSON.parse(data.content[0].text);
                currentAnalysis = analysis;
                document.getElementById('loadingContainer').style.display = 'none';
                displayVerdict(analysis);
                addToHistory(analysis);
            } catch (error) {
                document.getElementById('loadingContainer').style.display = 'none';
                document.getElementById('errorContainer').innerHTML = `
                    <div class="error-message">
                        Error refining analysis. Try again.
                    </div>
                `;
            }
        }

        function displayVerdict(analysis) {
            let verdictClass = '';
            let verdictEmoji = '';
            let verdictText = '';

            switch (analysis.verdict) {
                case 'GRAB_IT':
                    verdictClass = 'grab-it';
                    verdictEmoji = '✅';
                    verdictText = 'GRAB IT';
                    break;
                case 'CHECK_COMPS':
                    verdictClass = 'check-comps';
                    verdictEmoji = '🔵';
                    verdictText = 'CHECK COMPS';
                    break;
                case 'MAYBE':
                    verdictClass = 'maybe';
                    verdictEmoji = '🤔';
                    verdictText = 'MAYBE — Research';
                    break;
                case 'SKIP_IT':
                    verdictClass = 'skip-it';
                    verdictEmoji = '❌';
                    verdictText = 'SKIP IT';
                    break;
                case 'SEASONAL':
                    verdictClass = 'check-comps';
                    verdictEmoji = '📦';
                    verdictText = 'SEASONAL';
                    break;
            }

            const ebaySuggestion = analysis.ebaySuggestion || 'Item';
            const ebaySearchTerm = ebaySuggestion.replace(/\s+/g, '+');
            const ebayLink = `https://www.ebay.com/sch/i.html?_nkw=${ebaySearchTerm}&LH_Sold=1&LH_Complete=1`;

            let styleTag = '';
            if (analysis.styleKeywords && analysis.styleKeywords.length > 0) {
                styleTag = `<div class="verdict-reason"><strong>Style:</strong> ${analysis.styleKeywords.join(', ')}</div>`;
            }

            let detailsHtml = '';
            if (analysis.brand) {
                detailsHtml += `<div class="verdict-reason"><strong>Brand:</strong> ${analysis.brand}</div>`;
            }
            if (analysis.itemType) {
                detailsHtml += `<div class="verdict-reason"><strong>Type:</strong> ${analysis.itemType}</div>`;
            }
            if (analysis.color) {
                detailsHtml += `<div class="verdict-reason"><strong>Color:</strong> ${analysis.color}</div>`;
            }
            if (analysis.condition) {
                detailsHtml += `<div class="verdict-reason"><strong>Condition:</strong> ${analysis.condition}</div>`;
            }

            const html = `
                <div class="verdict-box ${verdictClass}">
                    <div class="verdict-label">
                        <span>${verdictEmoji}</span> ${verdictText}
                    </div>
                    <div class="verdict-reason">${analysis.reasoning}</div>
                    ${analysis.priceRange ? `<div class="price-range">💰 ${analysis.priceRange}</div>` : ''}
                    ${styleTag}
                    ${detailsHtml}
                    <a href="${ebayLink}" target="_blank" class="ebay-link">📊 Check eBay Comps</a>
                </div>

                ${(analysis.verdict === 'GRAB_IT' || analysis.verdict === 'CHECK_COMPS') ? `
                    <div class="action-buttons">
                        <button class="action-btn buy-btn" onclick="recordBought('${analysis.brand}', '${analysis.itemType}', '${analysis.priceRange}', '${ebayLink}')">
                            ✅ I Bought It
                        </button>
                        <button class="action-btn maybe-btn" onclick="addToMaybePile()">
                            💾 Save for Later
                        </button>
                    </div>
                ` : ''}
            `;

            document.getElementById('verdictContainer').innerHTML = html;
        }

        function addToHistory(analysis) {
            const item = {
                verdict: analysis.verdict,
                brand: analysis.brand || 'Unknown',
                type: analysis.itemType || 'Item',
                price: analysis.priceRange || '-',
                timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            analysisHistory.unshift(item);
            renderHistory();
        }

        function renderHistory() {
            if (analysisHistory.length === 0) {
                document.getElementById('historyContainer').style.display = 'none';
                return;
            }

            document.getElementById('historyContainer').style.display = 'block';
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = analysisHistory.map((item, index) => {
                let verdictClass = '';
                let verdictLabel = '';
                
                if (item.verdict.includes('GRAB')) verdictClass = 'grab';
                else if (item.verdict.includes('CHECK')) verdictClass = 'check';
                else if (item.verdict.includes('MAYBE')) verdictClass = 'maybe';
                else verdictClass = 'skip';

                return `
                    <div class="history-item ${verdictClass}">
                        <div>
                            <div class="history-verdict">${item.brand} ${item.type}</div>
                            <div class="history-details">${item.price} • ${item.timestamp}</div>
                        </div>
                        <button class="history-remove" onclick="removeFromHistory(${index})">×</button>
                    </div>
                `;
            }).join('');
        }

        function removeFromHistory(index) {
            analysisHistory.splice(index, 1);
            renderHistory();
        }

        function confirmClearHistory() {
            document.getElementById('confirmModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('confirmModal').classList.remove('active');
        }

        function clearHistory() {
            analysisHistory = [];
            renderHistory();
            closeModal();
        }

        function recordBought(brand, type, price, ebayLink) {
            alert(`Recorded: ${brand} ${type} (${price})\n\nIn full version: saves to Google Drive spreadsheet with eBay title, description, price, and weight.`);
        }

        function addToMaybePile() {
            alert('Saved to Maybe Pile!\n\nIn full version: stores item details for research and batch processing.');
        }
    </script>
</body>
</html>
